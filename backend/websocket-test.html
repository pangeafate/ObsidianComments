<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test - Obsidian Comments</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; }
        input { margin: 5px; padding: 5px; }
        button { padding: 8px 16px; margin: 5px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 3px; height: 150px; overflow-y: scroll; }
        .contributor { display: inline-block; margin: 5px; padding: 5px 10px; border-radius: 15px; color: white; }
        .status { padding: 5px; margin: 5px 0; }
        .connected { background: green; color: white; }
        .disconnected { background: red; color: white; }
        .highlighted-text { position: relative; }
        .highlight { position: absolute; background: rgba(255, 255, 0, 0.3); pointer-events: none; }
        .highlight-info { margin: 10px 0; padding: 10px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WebSocket Real-time Collaboration Test</h1>
        
        <div class="section">
            <h3>Connection</h3>
            <input type="text" id="shareId" placeholder="Share ID" value="wJz8UqKu8Mmz">
            <input type="text" id="contributorName" placeholder="Contributor Name" value="TestUser">
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>

        <div class="section">
            <h3>Contributors</h3>
            <div id="contributors"></div>
        </div>

        <div class="section">
            <h3>Document Editor</h3>
            <textarea id="documentContent" placeholder="Document content will appear here..."></textarea>
            <div>
                <input type="number" id="position" placeholder="Position" value="0">
                <input type="text" id="insertText" placeholder="Text to insert" value="Hello ">
                <button onclick="insertText()">Insert Text</button>
                <button onclick="deleteText()">Delete Text</button>
                <button onclick="requestSync()">Sync</button>
                <button onclick="requestHighlights()">Get Highlights</button>
            </div>
        </div>

        <div class="section">
            <h3>Text Highlights</h3>
            <div id="highlightsInfo" class="highlight-info">
                No highlights data
            </div>
            <div>
                <button onclick="clearHighlights()">Clear Highlights</button>
            </div>
        </div>

        <div class="section">
            <h3>Comments</h3>
            <div>
                <input type="number" id="commentStart" placeholder="Start Position" value="0">
                <input type="number" id="commentEnd" placeholder="End Position" value="5">
                <input type="text" id="commentContent" placeholder="Comment content" value="Great point!">
                <button onclick="addComment()">Add Comment</button>
            </div>
        </div>

        <div class="section">
            <h3>Event Log</h3>
            <div id="eventLog" class="log"></div>
            <button onclick="clearLog()">Clear Log</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentShareId = null;
        let currentContributorName = null;

        function log(message) {
            const logElement = document.getElementById('eventLog');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}<br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function updateStatus(connected) {
            const statusElement = document.getElementById('status');
            if (connected) {
                statusElement.textContent = 'Connected';
                statusElement.className = 'status connected';
            } else {
                statusElement.textContent = 'Disconnected';
                statusElement.className = 'status disconnected';
            }
        }

        function updateContributors(contributors) {
            const contributorsElement = document.getElementById('contributors');
            contributorsElement.innerHTML = '';
            
            contributors.forEach(contributor => {
                const div = document.createElement('div');
                div.className = 'contributor';
                div.style.backgroundColor = contributor.color;
                div.textContent = `${contributor.name} (cursor: ${contributor.cursorPosition || 'unknown'})`;
                contributorsElement.appendChild(div);
            });
        }

        function updateHighlights(highlights) {
            const highlightsElement = document.getElementById('highlightsInfo');
            
            if (!highlights || highlights.length === 0) {
                highlightsElement.innerHTML = 'No highlights data';
                return;
            }

            let html = `<strong>Active Highlights (${highlights.length}):</strong><br>`;
            highlights.forEach((highlight, index) => {
                const opacity = Math.round(highlight.intensity * 100);
                html += `
                    <div style="margin: 5px 0; padding: 5px; background: ${highlight.contributorColor}; opacity: ${highlight.intensity}; border-radius: 3px;">
                        <strong>${highlight.contributorName}</strong> - 
                        Position ${highlight.start}-${highlight.end} 
                        (Intensity: ${opacity}%)
                        <small>[${highlight.operationId}]</small>
                    </div>
                `;
            });
            
            highlightsElement.innerHTML = html;
            log(`Updated ${highlights.length} highlights`);
        }

        function connect() {
            const shareId = document.getElementById('shareId').value;
            const contributorName = document.getElementById('contributorName').value;
            
            if (!shareId || !contributorName) {
                alert('Please enter both Share ID and Contributor Name');
                return;
            }

            currentShareId = shareId;
            currentContributorName = contributorName;

            socket = io('https://obsidiancomments.lakestrom.com', {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                log('Connected to WebSocket server');
                updateStatus(true);
                
                // Join the share
                socket.emit('join-share', {
                    shareId: shareId,
                    contributorName: contributorName
                });
            });

            socket.on('disconnect', () => {
                log('Disconnected from WebSocket server');
                updateStatus(false);
            });

            socket.on('sync-state', (data) => {
                log('Received sync state');
                document.getElementById('documentContent').value = data.documentState.content;
                updateContributors(data.contributors);
                if (data.highlights) {
                    updateHighlights(data.highlights);
                }
            });

            socket.on('contributors-list', (data) => {
                log('Updated contributors list');
                updateContributors(data.contributors);
            });

            socket.on('contributor-join', (data) => {
                log(`${data.contributorName} joined`);
            });

            socket.on('contributor-leave', (data) => {
                log(`${data.contributorName} left`);
            });

            socket.on('text-change-applied', (data) => {
                log(`Text change by ${data.contributorName}: ${JSON.stringify(data.operation)}`);
                if (data.highlights) {
                    updateHighlights(data.highlights);
                }
                // In a real implementation, apply the operation to the text
            });

            socket.on('highlights-update', (data) => {
                log('Received highlights update');
                if (data.highlights) {
                    updateHighlights(data.highlights);
                }
            });

            socket.on('comment-add', (data) => {
                log(`New comment by ${data.contributorName}: ${data.comment.content}`);
            });

            socket.on('cursor-update', (data) => {
                log(`${data.contributorName} cursor at position ${data.position}`);
            });

            socket.on('error', (data) => {
                log(`Error: ${data.message}`);
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                updateStatus(false);
            }
        }

        function insertText() {
            if (!socket) {
                alert('Not connected');
                return;
            }

            const position = parseInt(document.getElementById('position').value) || 0;
            const text = document.getElementById('insertText').value;
            
            if (!text) {
                alert('Please enter text to insert');
                return;
            }

            const operation = [
                { retain: position },
                { insert: text }
            ];

            socket.emit('text-change', {
                shareId: currentShareId,
                operation: operation,
                operationId: 'op-' + Date.now(),
                baseVersion: 1
            });

            log(`Sending insert operation: ${text} at position ${position}`);
        }

        function deleteText() {
            if (!socket) {
                alert('Not connected');
                return;
            }

            const position = parseInt(document.getElementById('position').value) || 0;
            const length = 5; // Delete 5 characters

            const operation = [
                { retain: position },
                { delete: length }
            ];

            socket.emit('text-change', {
                shareId: currentShareId,
                operation: operation,
                operationId: 'op-' + Date.now(),
                baseVersion: 1
            });

            log(`Sending delete operation: ${length} chars at position ${position}`);
        }

        function addComment() {
            if (!socket) {
                alert('Not connected');
                return;
            }

            const startPos = parseInt(document.getElementById('commentStart').value) || 0;
            const endPos = parseInt(document.getElementById('commentEnd').value) || 5;
            const content = document.getElementById('commentContent').value;

            if (!content) {
                alert('Please enter comment content');
                return;
            }

            socket.emit('comment-add', {
                type: 'add',
                shareId: currentShareId,
                contributorName: currentContributorName,
                content: content,
                positionStart: startPos,
                positionEnd: endPos
            });

            log(`Adding comment: "${content}" at positions ${startPos}-${endPos}`);
        }

        function requestSync() {
            if (!socket) {
                alert('Not connected');
                return;
            }

            socket.emit('request-sync', {
                shareId: currentShareId
            });

            log('Requesting sync');
        }

        function requestHighlights() {
            if (!socket) {
                alert('Not connected');
                return;
            }

            socket.emit('request-highlights', {
                shareId: currentShareId
            });

            log('Requesting highlights');
        }

        function clearHighlights() {
            updateHighlights([]);
        }

        function clearLog() {
            document.getElementById('eventLog').innerHTML = '';
        }

        // Update cursor position when text area is clicked
        document.getElementById('documentContent').addEventListener('click', function(e) {
            if (socket) {
                const position = e.target.selectionStart;
                document.getElementById('position').value = position;
                
                socket.emit('cursor-move', {
                    contributorName: currentContributorName,
                    position: position
                });
            }
        });
    </script>
</body>
</html>
